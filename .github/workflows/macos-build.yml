name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt 6.10.2
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.2"
          host: "mac"
          target: "desktop"
          arch: "clang_64"
          cache: true

      - name: Install PostgreSQL client libraries
        run: brew install libpq

      - name: Configure CMake
        run: cmake -S . -B build-macos -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build app
        run: cmake --build build-macos --config Release --target appQMLGiraffic

      - name: Put example config into app bundle
        run: cp config/giraffic.ini.example build-macos/appQMLGiraffic.app/Contents/MacOS/giraffic.ini.example

      - name: Run macdeployqt
        run: |
          export PATH="$QT_ROOT_DIR/bin:$PATH"
          bash scripts/deploy-macos.sh build-macos/appQMLGiraffic.app .

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: giraffic-macos
          path: |
            build-macos/appQMLGiraffic.app
            build-macos/appQMLGiraffic.dmg
            config/giraffic.ini.example
